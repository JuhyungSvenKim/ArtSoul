<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d4a853"/>
      <stop offset="50%" stop-color="#c4994a"/>
      <stop offset="100%" stop-color="#b8862d"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#c4994a" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#c4994a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="#0f1729"/>
  <!-- 오행 원 -->
  <circle cx="256" cy="180" r="70" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.3"/>
  <circle cx="256" cy="180" r="50" fill="none" stroke="url(#gold)" stroke-width="1" opacity="0.2"/>
  <!-- 오행 5점 -->
  <circle cx="256" cy="110" r="6" fill="#4a9e6e" opacity="0.8"/>
  <circle cx="322" cy="158" r="6" fill="#d45050" opacity="0.8"/>
  <circle cx="297" cy="237" r="6" fill="#c49a3c" opacity="0.8"/>
  <circle cx="215" cy="237" r="6" fill="#a0a0a0" opacity="0.8"/>
  <circle cx="190" cy="158" r="6" fill="#4a7eb5" opacity="0.8"/>
  <!-- 중앙 심볼 -->
  <circle cx="256" cy="180" r="28" fill="url(#glow)" stroke="url(#gold)" stroke-width="1.5"/>
  <text x="256" y="187" text-anchor="middle" font-family="Georgia,serif" font-size="22" font-weight="bold" fill="url(#gold)">DNA</text>
  <!-- 타이틀 -->
  <text x="256" y="310" text-anchor="middle" font-family="Georgia,serif" font-size="72" font-weight="bold" fill="url(#gold)">ART</text>
  <text x="256" y="370" text-anchor="middle" font-family="Georgia,serif" font-size="40" fill="url(#gold)" opacity="0.8" letter-spacing="8">D.N.A.</text>
  <text x="256" y="420" text-anchor="middle" font-family="'Noto Sans KR',sans-serif" font-size="22" fill="#9ca3af">운명이 고른 그림</text>
